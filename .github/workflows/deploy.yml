name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  schedule:
    # JST 3:00 (UTC 18:00) と JST 15:00 (UTC 6:00) に1日2回再ビルド&デプロイ
    - cron: '0 18 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build
        run: bun run build

      - name: Verify Supabase URL in bundle
        run: |
          if grep -q "supabase.co" dist/index.js; then
            echo "✅ Supabase URL found in bundle"
          else
            echo "❌ Supabase URL NOT found in bundle!"
            echo "--- .env file contents (masked) ---"
            cat .env | sed 's/=.*/=***/'
            echo "--- Checking import.meta.env in bundle ---"
            grep -c "import.meta.env" dist/index.js || echo "No import.meta.env references"
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
