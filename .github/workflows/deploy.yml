name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  schedule:
    # JST 3:00 (UTC 18:00) と JST 15:00 (UTC 6:00) に1日2回再ビルド&デプロイ
    - cron: '0 18 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Validate Supabase build env
        run: |
          if ! grep -Eq '^VITE_SUPABASE_URL=https://.+\.supabase\.co$' .env; then
            echo "❌ VITE_SUPABASE_URL is missing or invalid"
            exit 1
          fi
          if ! grep -Eq '^VITE_SUPABASE_ANON_KEY=.+$' .env; then
            echo "❌ VITE_SUPABASE_ANON_KEY is missing"
            exit 1
          fi

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify Supabase config in bundle
        run: |
          node <<'EOF'
          const fs = require('fs')

          const bundle = fs.readFileSync('dist/index.js', 'utf8')
          const marker = 'Missing Supabase environment variables'
          const markerIndex = bundle.indexOf(marker)

          if (markerIndex === -1) {
            console.error('❌ Supabase env guard NOT found in bundle!')
            process.exit(1)
          }

          const snippet = bundle.slice(Math.max(0, markerIndex - 300), markerIndex + 900)
          console.log('--- Supabase bundle snippet ---')
          console.log(snippet)

          if (!snippet.includes(process.env.VITE_SUPABASE_URL)) {
            console.error('❌ Supabase URL is not inlined near getSupabase()')
            process.exit(1)
          }

          if (!snippet.includes(process.env.VITE_SUPABASE_ANON_KEY)) {
            console.error('❌ Supabase anon key is not inlined near getSupabase()')
            process.exit(1)
          }

          if (snippet.includes('VITE_SUPABASE_URL') || snippet.includes('VITE_SUPABASE_ANON_KEY')) {
            console.error('❌ import.meta.env placeholders remain near getSupabase()')
            process.exit(1)
          }

          console.log('✅ Supabase URL and anon key are inlined near getSupabase()')
          EOF
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
